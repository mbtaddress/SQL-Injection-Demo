version: "3.9"

services:

  # ─── PHP / Apache ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sqli_demo_app
    ports:
      - "8080:80"           # Access the app at http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: sql_demo
      DB_USER: root
      DB_PASS: root
    volumes:
      # Mount source so edits reflect without rebuild
      - .:/var/www/html
    networks:
      - sqli_net

  # ─── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: sqli_demo_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sql_demo
    ports:
      - "3307:3306"         # Exposed on 3307 to avoid clashing with a local MySQL
    volumes:
      - ./Config/sql_demo.sql:/docker-entrypoint-initdb.d/sql_demo.sql  # Auto-import on first run
      - sqli_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sqli_net

  # ─── phpMyAdmin (optional but handy for the demo) ───────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sqli_demo_pma
    restart: unless-stopped
    ports:
      - "8081:80"           # Access phpMyAdmin at http://localhost:8081
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sqli_net

volumes:
  sqli_db_data:

networks:
  sqli_net:
    driver: bridge
